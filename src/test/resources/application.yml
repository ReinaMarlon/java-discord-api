spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  frontend:
    set-secure: false
    redirect-url: http://localhost:8080/api/v1/auth/callback
    base-url: http://localhost:8080/
    welcome-url-template: http://localhost:8080/api/v1/guilds/1234/config/welcome/raw

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  discord:
    client-id: 57363473
    client-secret: test-client-secret
    redirect-uri: http://localhost:8080/api/v1/auth/callback

  jwt-secret: test-jwt-secret-value-for-context-loads

discord:
  bot-token: test-bot-token
  oauth:
    scopes: identify

logging:
  level:
    org.springframework.web: ERROR

server:
  port: ${PORT:8080}
