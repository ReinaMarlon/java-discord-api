spring:
  application:
    name: java-discord-api

  profiles:
    active: prod

  lifecycle:
    timeout-per-shutdown-phase: 30s

  frontend:
    set-secure: ${SET_SECURE}
    base-url: ${BASE_URL}
    redirect-url: ${REDIRECT_URL}

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    com.marlonreina.discord.api: DEBUG


datasource:
  hikari:
    connection-timeout: 30000
    maximum-pool-size: 10

server:
  port: ${PORT:8080}

discord:
  oauth:
    scopes: ${OAUTH_SCOPES}

---

spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${RAILWAY_TCP_PROXY_DOMAIN}:${RAILWAY_TCP_PROXY_PORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  discord:
    client-id: ${DISCORD_CLIENT_ID}
    client-secret: ${DISCORD_CLIENT_SECRET}
    redirect-uri: ${DISCORD_REDIRECT_URL}

  jwt-secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: never

  info:
    env:
      enabled: false
      
---

spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://${TESTING_RAILWAY_TCP_PROXY_DOMAIN}:${TESTING_RAILWAY_TCP_PROXY_PORT}/${TESTING_PGDATABASE}
    username: ${TESTING_PGUSER}
    password: ${TESTING_PGPASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  discord:
    client-id: ${DISCORD_CLIENT_ID}
    client-secret: ${DISCORD_CLIENT_SECRET}
    redirect-uri: ${TESTING_DISCORD_REDIRECT_URL}

  jwt-secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

  info:
    env:
      enabled: true